<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artifact Viewer</title>

fp/////v/////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////Hx8f/pKSk/6SkpP/S0tL/+fnz//X18f/+/v3///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////39/f/q6ur/7evt///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////+//7//////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////v7+//7+/v//////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github-dark.min.css">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --card: #111827;
      --border: #334155;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    .wrap {
      max-width: 1400px;
      margin: 1rem auto;
      padding: 0 1rem 2rem;
    }

    .raw-icon {
      position: fixed;
      top: 0.65rem;
      right: 0.8rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8rem;
      height: 1.8rem;
      border: 1px solid var(--border);
      border-radius: 9999px;
      background: var(--card);
      color: var(--accent);
      text-decoration: none;
      font-size: 1rem;
      line-height: 1;
      z-index: 10;
    }

    .raw-icon:hover {
      filter: brightness(1.15);
    }

    #content {
      margin-top: 1.75rem;
    }

    a {
      color: var(--accent);
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      overflow-x: auto;
      background: #020617;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    p code, li code, td code {
      background: #1e293b;
      padding: 0.15em 0.35em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    img, video {
      max-width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: block;
    }

    .error {
      color: #fca5a5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.75rem 0;
      border: 1px solid var(--border);
    }

    th,
    td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.55rem;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #0b1220;
    }

    blockquote {
      border-left: 3px solid var(--accent);
      margin: 0.75rem 0;
      padding: 0.25rem 1rem;
      color: var(--muted);
      background: #0b1220;
      border-radius: 0 6px 6px 0;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    h1, h2, h3, h4, h5, h6 {
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .mermaid {
      background: #1e293b;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .task-list-item {
      list-style: none;
    }

    .task-list-item input[type="checkbox"] {
      margin-right: 0.4em;
    }
  </style>
</head>
<body>
  <a id="raw-link" class="raw-icon" href="#" download title="Download raw file">⤓</a>
  <div class="wrap">
    <div id="content">
      <noscript><p>JavaScript is required to render this artifact. To download the raw file, remove <code>/?</code> from the URL (e.g. change <code>…/?file.txt</code> to <code>…/file.txt</code>).</p></noscript>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked@17/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script>
    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    const CODE_EXTS = {
      ".py": "python", ".pyw": "python",
      ".js": "javascript", ".mjs": "javascript", ".cjs": "javascript",
      ".ts": "typescript", ".tsx": "typescript", ".jsx": "javascript",
      ".json": "json", ".jsonc": "json",
      ".xml": "xml", ".xsl": "xml",
      ".css": "css", ".scss": "scss", ".less": "less",
      ".sh": "bash", ".bash": "bash", ".zsh": "bash", ".fish": "bash",
      ".yml": "yaml", ".yaml": "yaml",
      ".sql": "sql",
      ".rb": "ruby", ".erb": "ruby",
      ".go": "go",
      ".rs": "rust",
      ".java": "java",
      ".c": "c", ".h": "c",
      ".cpp": "cpp", ".cc": "cpp", ".cxx": "cpp", ".hpp": "cpp", ".hxx": "cpp",
      ".cs": "csharp",
      ".php": "php",
      ".swift": "swift",
      ".kt": "kotlin", ".kts": "kotlin",
      ".r": "r",
      ".lua": "lua",
      ".pl": "perl", ".pm": "perl",
      ".toml": "ini", ".ini": "ini", ".cfg": "ini",
      ".diff": "diff", ".patch": "diff",
      ".dockerfile": "dockerfile",
      ".makefile": "makefile",
      ".cmake": "cmake",
      ".tf": "hcl",
      ".proto": "protobuf",
      ".graphql": "graphql", ".gql": "graphql",
      ".zig": "zig",
      ".ex": "elixir", ".exs": "elixir",
      ".erl": "erlang",
      ".hs": "haskell",
      ".ml": "ocaml", ".mli": "ocaml",
      ".clj": "clojure", ".cljs": "clojure",
      ".scala": "scala",
      ".vim": "vim",
      ".el": "lisp",
      ".nix": "nix",
    };

    const BASENAME_LANGS = {
      "dockerfile": "dockerfile",
      "makefile": "makefile",
      "cmakelists.txt": "cmake",
      "gemfile": "ruby",
      "rakefile": "ruby",
      ".bashrc": "bash",
      ".zshrc": "bash",
      ".profile": "bash",
      ".gitignore": "plaintext",
      ".env": "ini",
    };

    function getFileMode(filename) {
      const lower = filename.toLowerCase();
      if (lower.endsWith(".md") || lower.endsWith(".markdown") || lower.endsWith(".txt")) {
        return "markdown";
      }
      const ext = lower.includes(".") ? "." + lower.split(".").pop() : "";
      if (CODE_EXTS[ext]) return CODE_EXTS[ext];
      const base = lower.split("/").pop();
      if (BASENAME_LANGS[base]) return BASENAME_LANGS[base];
      return "markdown";
    }

    var VIDEO_RE = /\.(mp4|webm|ogg|mov)$/i;

    // Configure marked with highlight.js for code blocks and mermaid support
    marked.use({
      gfm: true,
      renderer: {
        image({ href, title, text }) {
          if (VIDEO_RE.test(href)) {
            var titleAttr = title ? ' title="' + escapeHtml(title) + '"' : '';
            return '<video controls' + titleAttr + '><source src="' + escapeHtml(href) + '" />' + escapeHtml(text) + '</video>';
          }
          var titleAttr = title ? ' title="' + escapeHtml(title) + '"' : '';
          return '<img src="' + escapeHtml(href) + '" alt="' + escapeHtml(text) + '"' + titleAttr + ' />';
        },
        code({ text, lang }) {
          if (lang === "mermaid") {
            return '<pre class="mermaid">' + escapeHtml(text) + "</pre>";
          }
          if (lang && hljs.getLanguage(lang)) {
            const highlighted = hljs.highlight(text, { language: lang }).value;
            return '<pre><code class="hljs language-' + escapeHtml(lang) + '">' + highlighted + "</code></pre>";
          }
          const auto = hljs.highlightAuto(text);
          return '<pre><code class="hljs">' + auto.value + "</code></pre>";
        },
      },
    });

    function readFilenameFromQuery() {
      const raw = window.location.search.startsWith("?")
        ? window.location.search.slice(1)
        : "";
      if (!raw) return "";

      if (raw.includes("=")) {
        const params = new URLSearchParams(window.location.search);
        return decodeURIComponent(params.get("file") || params.get("filename") || "").trim();
      }

      return decodeURIComponent(raw).trim();
    }

    async function main() {
      const filename = readFilenameFromQuery();
      const content = document.getElementById("content");
      const rawLink = document.getElementById("raw-link");

      if (!filename) {
        content.innerHTML = "<p class=\"error\">Missing filename. Open this page as /?myfile.txt</p>";
        rawLink.style.display = "none";
        return;
      }

      const rawHref = encodeURI(filename);
      rawLink.href = rawHref;
      rawLink.download = filename;
      rawLink.title = "Download raw: " + filename;

      try {
        const response = await fetch(rawHref, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const contentType = (response.headers.get("content-type") || "").toLowerCase();
        const lower = filename.toLowerCase();
        const imageExts = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".svg", ".bmp"];
        const isImage = contentType.startsWith("image/") || imageExts.some(function (ext) { return lower.endsWith(ext); });

        if (isImage) {
          content.innerHTML = '<img src="' + rawHref + '" alt="' + escapeHtml(filename) + '" />';
          return;
        }

        const videoExts = [".mp4", ".webm", ".ogg", ".mov"];
        const isVideo = contentType.startsWith("video/") || videoExts.some(function (ext) { return lower.endsWith(ext); });

        if (isVideo) {
          content.innerHTML = '<video controls style="max-width:100%;border:1px solid var(--border);border-radius:8px;"><source src="' + rawHref + '" />' + escapeHtml(filename) + '</video>';
          return;
        }

        const isPdf = contentType.includes("application/pdf") || lower.endsWith(".pdf");

        if (isPdf) {
          // Render PDF in a near-fullpage iframe using the browser's built-in PDF viewer
          document.querySelector(".wrap").style.cssText = "max-width:none;margin:0;padding:0;position:fixed;inset:0;top:2.5rem;";
          var iframe = document.createElement("iframe");
          iframe.src = rawHref;
          iframe.style.cssText = "width:100%;height:100%;border:none;";
          content.style.cssText = "margin:0;height:100%;";
          content.innerHTML = "";
          content.appendChild(iframe);
          return;
        }

        const htmlExts = [".html", ".htm"];
        const isHtml = contentType.includes("text/html") || htmlExts.some(function (ext) { return lower.endsWith(ext); });

        if (isHtml) {
          // Render HTML in a near-fullpage sandboxed iframe
          document.querySelector(".wrap").style.cssText = "max-width:none;margin:0;padding:0;position:fixed;inset:0;top:2.5rem;";
          var iframe = document.createElement("iframe");
          iframe.src = rawHref;
          iframe.sandbox = "allow-scripts allow-same-origin";
          iframe.style.cssText = "width:100%;height:100%;border:none;";
          content.style.cssText = "margin:0;height:100%;";
          content.innerHTML = "";
          content.appendChild(iframe);
          return;
        }

        const text = await response.text();
        const mode = getFileMode(filename);

        if (mode === "markdown") {
          const rawHtml = marked.parse(text);
          content.innerHTML = DOMPurify.sanitize(rawHtml, { ADD_TAGS: ["pre", "video", "source"], ADD_ATTR: ["class", "controls", "src"] });
        } else {
          const highlighted = hljs.getLanguage(mode)
            ? hljs.highlight(text, { language: mode }).value
            : escapeHtml(text);
          content.innerHTML = '<pre><code class="hljs language-' + escapeHtml(mode) + '">' + highlighted + "</code></pre>";
        }

        // Render mermaid diagrams if any exist
        var mermaidEls = document.querySelectorAll(".mermaid");
        if (mermaidEls.length > 0) {
          var mermaidScript = document.createElement("script");
          mermaidScript.src = "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js";
          mermaidScript.onload = function () {
            mermaid.initialize({ startOnLoad: false, theme: "dark" });
            mermaid.run({ querySelector: ".mermaid" });
          };
          document.body.appendChild(mermaidScript);
        }
      } catch (err) {
        content.innerHTML = '<p class="error">Failed to load ' + escapeHtml(filename) + ": " + escapeHtml(String(err)) + "</p>";
      }
    }

    main();
  </script>
</body>
</html>
